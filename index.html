/* ---- gradient fills (the premium signal on bars/areas) ---- */
function hexA(hex,a){ var h=hex.replace('#',''); var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16); return 'rgba('+r+','+g+','+b+','+a+')'; }
function vGrad(ctx,hex){ /* vertical bar gradient: bright top → deep base */
  var a=ctx.chart.chartArea; if(!a) return hex;
  var g=ctx.chart.ctx.createLinearGradient(0,a.top,0,a.bottom);
  g.addColorStop(0,hexA(hex,0.95)); g.addColorStop(1,hexA(hex,0.55)); return g; }
function hGrad(ctx,hex){ /* horizontal bar gradient: deep left → bright right */
  var a=ctx.chart.chartArea; if(!a) return hex;
  var g=ctx.chart.ctx.createLinearGradient(a.left,0,a.right,0);
  g.addColorStop(0,hexA(hex,0.6)); g.addColorStop(1,hexA(hex,0.95)); return g; }
function areaGrad(ctx,hex){ /* line area fill */
  var a=ctx.chart.chartArea; if(!a) return hexA(hex,0.12);
  var g=ctx.chart.ctx.createLinearGradient(0,a.top,0,a.bottom);
  g.addColorStop(0,hexA(hex,0.28)); g.addColorStop(1,hexA(hex,0.01)); return g; }

/* ---- datalabel formatters ---- */
function dlK(v){ if(v==null||v===0) return ''; v=+v;
  if(Math.abs(v)>=1000000) return '$'+(v/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if(Math.abs(v)>=1000) return '$'+(v/1000).toFixed(1).replace(/\.0$/,'')+'K';
  return '$'+v; }
function dlNum(v){ if(v==null||v==='') return ''; v=+v; return v>=100?Math.round(v):v.toFixed(1).replace(/\.0$/,''); }
function dlX(v){ return v==null?'':(+v).toFixed(2)+'\u00d7'; }
function dlPct(v){ return v==null?'':(+v).toFixed(0)+'%'; }

/* ---- shared styled tooltip (dark glass) ---- */

/* ---- refined axes ---- */
function axis(opts){ return Object.assign({ grid:{ color:'rgba(148,163,184,0.05)', drawBorder:false }, border:{display:false}, ticks:{ color:CO.muted, font:{size:11} } }, opts||{}); }
function noGrid(){ return { grid:{ display:false }, border:{display:false}, ticks:{ color:CO.muted, font:{size:11} } }; }

/* ---- datalabel presets ---- */
function dlTop(color,fmt){ return { display:true, anchor:'end', align:'end', offset:2, clamp:true, color:color||CO.text, font:{size:11,weight:'700'}, formatter:fmt||dlNum }; }
function dlEndH(color,fmt){ return { display:true, anchor:'end', align:'right', offset:4, clamp:true, color:color||CO.text, font:{size:11,weight:'700'}, formatter:fmt||dlNum }; }
function dlPoint(color,fmt){ return { display:true, anchor:'end', align:'top', offset:6, color:color||CO.text, font:{size:10,weight:'700'}, formatter:fmt||dlNum }; }

function kpi(label, value, sub, accent){
  return '<div class="kpi-card'+(accent?' accent-'+accent:'')+'">'+

}

/* ============================================================
   ROUTER
   ============================================================ */
var container = document.getElementById('dashboardContainer');
function render(view){
  document.querySelectorAll('.nav-item').forEach(function(b){ b.classList.toggle('active', b.dataset.view===view); });
  (VIEWS[view]||VIEWS.overview)(container);
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav-item').forEach(function(b){
  b.addEventListener('click',function(){ render(b.dataset.view); if(window.innerWidth<=768){ closeSidebar(); } });
});
/* mobile */
var sidebar=document.getElementById('sidebar'), overlay=document.getElementById('sidebarOverlay');
function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('active'); }
function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('active'); }
document.getElementById('menuToggle').addEventListener('click',openSidebar);
overlay.addEventListener('click',closeSidebar);

render('overview');
</script>
