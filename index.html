    return (v < 0 ? "-$" : "$") + Math.abs(Math.round(v));

  // ── HTML builders ──
  function headline(title, subtitle) {

  function kpiRow(items) {

    return `<div class="kpi-row ${cls}">${items.map((k) => `

  function dataTable(title, headers, rows) {
    return `<div class="data-table-card">
      <div class="chart-card-title">${title}</div>

        <table class="data-table">

            const cls = isObj && c.cls ? ` class="${c.cls}"` : "";

  // ── Custom per-chart plugin factory: threshold-zone shading + dashed annotated lines ──
  // bands: [{axis:'y'|'x', from, to, color, label, labelColor}]
  // lines: [{axis:'y'|'x', at, color, label, labelAlign}]
  function makeAnnotPlugin(opts) {
    return {
      id: "annot_" + Math.random().toString(36).slice(2),
      afterDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea) return;
        const { left, right, top, bottom } = chartArea;
        ctx.save();
        // Zone bands
        (opts.bands || []).forEach((b) => {
          const sc = scales[b.axis === "x" ? "x" : "y"];
          if (!sc) return;
          if (b.axis === "y") {
            let p1 = sc.getPixelForValue(b.from);
            let p2 = sc.getPixelForValue(b.to);
            const yTop = Math.min(p1, p2), yBot = Math.max(p1, p2);
            ctx.fillStyle = b.color;
            ctx.fillRect(left, Math.max(yTop, top), right - left, Math.min(yBot, bottom) - Math.max(yTop, top));
            if (b.label) {
              ctx.fillStyle = b.labelColor || C.textMuted;
              ctx.font = "700 9px Inter";
              ctx.textAlign = "left";
              ctx.textBaseline = "top";
              ctx.fillText(b.label, left + 8, Math.max(yTop, top) + 5);
            }
          } else {
            let p1 = sc.getPixelForValue(b.from);
            let p2 = sc.getPixelForValue(b.to);
            const xL = Math.min(p1, p2), xR = Math.max(p1, p2);
            ctx.fillStyle = b.color;
            ctx.fillRect(Math.max(xL, left), top, Math.min(xR, right) - Math.max(xL, left), bottom - top);
            if (b.label) {
              ctx.fillStyle = b.labelColor || C.textMuted;
              ctx.font = "700 9px Inter";
              ctx.textAlign = "center";
              ctx.textBaseline = "top";
              ctx.fillText(b.label, (Math.max(xL, left) + Math.min(xR, right)) / 2, top + 5);
            }
          }
        });
        // Dashed target lines + label chips
        (opts.lines || []).forEach((l) => {
          const sc = scales[l.axis === "x" ? "x" : "y"];
          if (!sc) return;
          ctx.save();
          ctx.strokeStyle = l.color;
          ctx.lineWidth = 1.5;
          ctx.setLineDash([6, 4]);
          if (l.axis === "y") {
            const y = sc.getPixelForValue(l.at);
            ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
            if (l.label) drawChip(ctx, l.label, right - 8, y, "right", l.color);
          } else {
            const x = sc.getPixelForValue(l.at);
            ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bottom); ctx.stroke();
            if (l.label) drawChip(ctx, l.label, x, top + 4, "center", l.color, true);
          }
          ctx.restore();
        });
        ctx.restore();
      },
    };
  }
  function drawChip(ctx, text, x, y, align, color, topAnchor) {
    ctx.save();
    ctx.setLineDash([]);
    ctx.font = "700 9px Inter";
    const padX = 6, padY = 3, h = 16;
    const w = ctx.measureText(text).width + padX * 2;
    let bx = x;
    if (align === "right") bx = x - w;
    else if (align === "center") bx = x - w / 2;
    let by = topAnchor ? y : y - h / 2;
    ctx.fillStyle = "rgba(15,23,42,0.92)";
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    roundRect(ctx, bx, by, w, h, 4);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = color;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(text, bx + padX, by + h / 2 + 0.5);
    ctx.restore();
  }
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

      type: "line",

  function renderTarget() {
    const an = A.analysis;
    const convPct = an.convRange.map((c) => (c * 100).toFixed(1).replace(/\.0$/, "") + "%");
    const contLabels = an.contRange.map((c) => Math.round(c * 100) + "%");
    const seriesColors = [C.textMuted, C.cyan, C.indigo, C.amber, C.emerald];

    // one line per contacted rate, across conversion range
    const gridDatasets = an.sens.map((row, i) => ({
      label: contLabels[i] + " contacted",
      data: row,
      borderColor: seriesColors[i],
      backgroundColor: seriesColors[i],
      pointRadius: row.map((v) => (v >= 6 ? 6 : 3)),
      pointHoverRadius: 8,
      pointBackgroundColor: row.map((v) => (v >= 6 ? C.emerald : seriesColors[i])),
      pointBorderColor: row.map((v) => (v >= 6 ? C.emerald : seriesColors[i])),
      borderWidth: 2, tension: 0.15,
      datalabels: {
        display: (ctx) => ctx.dataset.data[ctx.dataIndex] >= 6 && ctx.dataset.data[ctx.dataIndex] < 6.5,
        color: C.emerald, font: { size: 8, weight: "700", family: "Inter" },
        align: "top", offset: 4, formatter: (v) => v.toFixed(1),
      },
    }));

    // contacted-rate sweep at fixed 3% conversion (index 2 of convRange)
    const sweepData = an.sens.map((row) => row[2]);

    container.innerHTML = `<div class="dashboard-view">
      ${headline("Path to Target — Two Levers, Both Worth $2,050/wk",
        "Hitting 6 acquisitions/wk needs either conversion lifted 3% → 4.2% or the contact rate lifted 37% → 52%. Of the four levers available, conversion moves acquisitions most per realistic unit of effort. Only the top-right of the sensitivity grid clears the target.")}
      ${kpiRow([
        { label: "Target", value: "6.0", accent: "accent-green", sub: "acq / week" },
        { label: "Modeled", value: "4.3", accent: "accent-amber", sub: "acq / week" },
        { label: "Conversion to hit 6", value: "4.2%", sub: "from 3.0%" },
        { label: "Contact rate to hit 6", value: "51.7%", sub: "from 37%" },
        { label: "Contacted needed", value: "200", accent: "accent-red", sub: "have 143 / wk" },
      ])}
      <div class="chart-grid cols-2">
        ${chartCard("tgGrid", "Only the top-right of the grid clears 6/week.", 380)}
        ${chartCard("tgSweep", "A 52% contact rate is the single lever that crosses 6/week.", 380)}
      </div>
      ${dataTable("Sensitivity Grid — Acquisitions/wk by Contact Rate × Conversion",
        ["Contacted ↓ / Conv →"].concat(convPct),
        an.sens.map((row, i) => [
          { v: contLabels[i] + " contacted", style: "font-weight:600;" }
        ].concat(row.map((v) => ({
          v: v.toFixed(2),
          style: v >= 6 ? "color:#10B981;font-weight:700;background:rgba(16,185,129,0.10);"
                        : "color:#94A3B8;",
        }))))
      )}
      ${verdict("Verdict — Rank the Levers, Then Pull",
        "Closing the gap to 6/wk requires roughly <b>200 contacted leads/wk vs the 143 the plan reaches today</b>. Ranked by acquisitions gained per realistic move: <b>(1) conversion +1pt → +1.43 acq/wk ($1,716)</b>, (2) contact rate +10pts → +1.16 acq ($1,392), (3) ad budget +20% → +0.86 acq ($1,030), (4) CPL down $2 → +0.66 acq ($792). <b>Conversion is the highest-leverage lever</b> — improving the offer and call quality beats simply spending more. Either of the top two alone crosses the target; each is worth <b style='color:#10B981'>$2,050/wk ($8,198/mo)</b>. The green cells mark every combination that clears 6.",
        true)}
    </div>`;

    killCharts();

    // Chart A: sensitivity family of lines, target=6 shaded zone + dashed line
    mkChart("tgGrid", {
      type: "line",
      data: { labels: convPct, datasets: gridDatasets },
      options: {
        responsive: true, maintainAspectRatio: false, animation: baseAnim,
        interaction: { mode: "nearest", intersect: true },
        plugins: {
          legend: { labels: { color: C.textSec, font: { size: 10, family: "Inter" }, boxWidth: 12, padding: 10 } },
          tooltip: { ...baseTooltip, mode: "nearest", intersect: true, callbacks: {
            title: (items) => "Conversion " + items[0].label,
            label: (ctx) => ctx.dataset.label + ": " + ctx.parsed.y.toFixed(2) + " acq/wk",
            afterLabel: (ctx) => (ctx.parsed.y >= 6 ? "  ✓ clears the 6-acq target" : "  ✗ below target"),
          } },
        },
        scales: {
          x: { ...baseScaleX, title: { display: true, text: "Conversion rate →", color: C.indigo, font: { size: 11, weight: "600" } } },
          y: { ...baseScaleY("Acquisitions / week"), ticks: { color: C.textMuted, font: { size: 9 }, callback: (v) => v }, suggestedMax: 12 },
        },
      },
      plugins: [ makeAnnotPlugin({
        bands: [{ axis: "y", from: 6, to: 12, color: "rgba(16,185,129,0.07)", label: "CLEARS TARGET (≥6)", labelColor: C.emerald }],
        lines: [{ axis: "y", at: 6, color: C.emerald, label: "Target 6/wk" }],
      }) ],
    });

    // Chart B: contacted-rate sweep at fixed 3% conversion with 52% threshold chip
    mkChart("tgSweep", {
      type: "line",
      data: {
        labels: contLabels,
        datasets: [{
          label: "Acquisitions/wk @ 3% conversion",
          data: sweepData,
          borderColor: C.cyan, backgroundColor: "rgba(6,182,212,0.10)", fill: true, tension: 0.2,
          pointRadius: sweepData.map((v) => (v >= 6 ? 7 : 4)),
          pointHoverRadius: 9,
          pointBackgroundColor: sweepData.map((v) => (v >= 6 ? C.emerald : C.cyan)),
          pointBorderColor: sweepData.map((v) => (v >= 6 ? C.emerald : C.cyan)),
          datalabels: { display: true, anchor: "end", align: "top",
            color: sweepData.map((v) => (v >= 6 ? C.emerald : C.cyan)),
            font: { size: 9, weight: "700", family: "Inter" }, formatter: (v) => v.toFixed(2) },
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: baseAnim,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { ...baseTooltip, callbacks: {
            title: (items) => "Contact rate " + items[0].label,
            label: (ctx) => ctx.parsed.y.toFixed(2) + " acq/wk",
            afterBody: (items) => {
              const v = sweepData[items[0].dataIndex];
              return [v >= 6 ? "  ✓ crosses the 6-acq target" : "  ✗ below target — need 52%+"];
            },
          } },
        },
        scales: {
          x: { ...baseScaleX, title: { display: true, text: "Contact rate →", color: C.cyan, font: { size: 11, weight: "600" } } },
          y: { ...baseScaleY("Acquisitions / week"), ticks: { color: C.textMuted, font: { size: 9 }, callback: (v) => v }, suggestedMax: 9 },
        },
      },
      plugins: [ makeAnnotPlugin({
        bands: [{ axis: "y", from: 6, to: 9, color: "rgba(16,185,129,0.07)", label: "TARGET ZONE (≥6)", labelColor: C.emerald }],
        lines: [
          { axis: "y", at: 6, color: C.emerald, label: "Target 6/wk" },
          { axis: "x", at: "52%", color: C.amber, label: "52% threshold" },
        ],
      }) ],
    });
  }


  // ===========================================================================
  // VIEW 5b — FUNNEL LEAKAGE & LEVER ELASTICITY
  // ===========================================================================
  function renderFunnel() {
    const w = A.weekly, an = A.analysis;

    container.innerHTML = `<div class="dashboard-view">
      ${headline("Funnel & Levers — Where the Week Leaks, and What Fixes It",
        "387 leads collapse to 4.3 acquisitions. 244 leads/wk are never contacted and 139 contacted leads never convert — the largest pool of trapped value sits in the un-contacted step, worth ~$8,770/wk if reached and converted at today's rate.")}
      ${kpiRow([
        { label: "Leads → Contacted", value: "37%", accent: "accent-amber", sub: "244 never reached" },
        { label: "Contacted → Acq", value: "3%", accent: "accent-red", sub: "139 don't convert" },
        { label: "End-to-end yield", value: "1.1%", sub: "leads → acq" },
        { label: "Trapped (un-contacted)", value: "$8,770", accent: "accent-amber", sub: "per week, if reached" },
        { label: "Value / contacted lead", value: "$36", accent: "accent-green", sub: "marginal" },
      ])}
      <div class="chart-grid cols-2">
        ${chartCard("fnFunnel", "Each step compounds: 387 leads → 143 contacted → 4.3 acquired.", 380)}
        ${chartCard("fnLevers", "Conversion gains the most acquisitions per realistic move.", 380)}
      </div>
      ${dataTable("Where Value Leaks — Stage-by-Stage",
        ["Funnel stage", "Count / wk", "Drop-off", "Trapped value / wk"],
        [
          ["Leads generated", "387", { v: "—", style: "color:#64748B;" }, { v: "—", style: "color:#64748B;" }],
          ["Contacted (37%)", { v: "143", style: "color:#F59E0B;font-weight:600;" }, { v: "−244 leads", style: "color:#EF4444;font-weight:600;" }, { v: "$8,770", style: "color:#F59E0B;font-weight:700;" }],
          ["Acquired (3%)", { v: "4.3", style: "color:#10B981;font-weight:600;" }, { v: "−139 contacted", style: "color:#EF4444;font-weight:600;" }, { v: "$4,995", style: "color:#F59E0B;font-weight:700;" }],
        ])}
      ${verdict("Verdict — The Contact Step Is the Bottleneck",
        "The steepest drop is <b>leads → contacted</b>: 244 of 387 leads/wk are never reached, and at today's 3% conversion that un-contacted pool holds <b style='color:#F59E0B'>~$8,770/wk of trapped revenue</b>. That is why reps and dialing capacity dominate the plan — more contact directly unlocks the biggest leak. Among all levers, <b>a 1-point conversion gain adds the most acquisitions per realistic unit of effort (+1.43 acq/wk)</b>, ahead of contact rate, more budget, or a lower CPL. Fix contact capacity first (the volume bottleneck), then conversion (the highest-yield lever).",
        true)}
    </div>`;

    killCharts();

    // Chart A: funnel collapse — log-scale horizontal bars
    mkChart("fnFunnel", {
      type: "bar",
      data: {
        labels: ["Leads", "Contacted", "Acquired"],
        datasets: [{
          label: "Count / week",
          data: [w.leads, w.contacted, w.acqModel],
          backgroundColor: ["rgba(99,102,241,0.45)", "rgba(245,158,11,0.45)", "rgba(16,185,129,0.55)"],
          borderColor: [C.indigo, C.amber, C.emerald],
          borderWidth: 1.5, borderRadius: barRadius,
          datalabels: { display: true, anchor: "end", align: "right", offset: 4,
            color: [C.indigo, C.amber, C.emerald],
            font: { size: 11, weight: "700", family: "Inter" },
            formatter: (v, ctx) => (ctx.dataIndex === 2 ? v.toFixed(1) : Math.round(v)) },
        }],
      },
      options: {
        indexAxis: "y",
        responsive: true, maintainAspectRatio: false, animation: baseAnim,
        layout: { padding: { right: 44 } },
        plugins: {
          legend: { display: false },
          tooltip: { ...baseTooltip, mode: "nearest", intersect: true, callbacks: {
            label: (ctx) => ctx.label + ": " + (ctx.dataIndex === 2 ? ctx.parsed.x.toFixed(1) : Math.round(ctx.parsed.x)) + " / wk",
            afterBody: (items) => {
              const i = items[0].dataIndex;
              if (i === 0) return ["  $5,800 spend ÷ $15 CPL"];
              if (i === 1) return ["  37% contact rate — 244 leads never reached"];
              return ["  3% conversion — 139 contacted don't convert"];
            },
          } },
        },
        scales: {
          x: { type: "logarithmic", title: { display: true, text: "Count / week (log scale)", color: C.textMuted, font: { size: 10 } },
            ticks: { color: C.textMuted, font: { size: 9 }, callback: (v) => ([1, 10, 100].includes(v) ? v : null) }, grid: { color: C.gridLine } },
          y: { ...baseScaleX, ticks: { color: C.text, font: { size: 11, weight: "600", family: "Inter" } } },
        },
      },
    });

    // Chart B: lever elasticity ranking — horizontal bars
    const lv = an.levers;
    const lvColors = lv.map((_, i) => (i === 0 ? C.emerald : i === 1 ? C.cyan : C.indigo));
    const lvFills = lvColors.map((c) => (c === C.emerald ? "rgba(16,185,129,0.5)" : c === C.cyan ? "rgba(6,182,212,0.5)" : "rgba(99,102,241,0.45)"));
    mkChart("fnLevers", {
      type: "bar",
      data: {
        labels: lv.map((l) => l.lever),
        datasets: [{
          label: "Acquisitions gained / wk",
          data: lv.map((l) => l.dAcq),
          backgroundColor: lvFills,
          borderColor: lvColors, borderWidth: 1.5, borderRadius: barRadius,
          datalabels: { display: true, anchor: "end", align: "right", offset: 4,
            color: lvColors,
            font: { size: 10, weight: "700", family: "Inter" },
            formatter: (v, ctx) => "+" + v.toFixed(2) + " · " + dlFmtK(lv[ctx.dataIndex].dRevWk) },
        }],
      },
      options: {
        indexAxis: "y",
        responsive: true, maintainAspectRatio: false, animation: baseAnim,
        layout: { padding: { right: 96 } },
        plugins: {
          legend: { display: false },
          tooltip: { ...baseTooltip, mode: "nearest", intersect: true, callbacks: {
            label: (ctx) => "+" + ctx.parsed.x.toFixed(2) + " acq/wk",
            afterBody: (items) => ["  Worth " + fmtDollar(lv[items[0].dataIndex].dRevWk) + "/wk"],
          } },
        },
        scales: {
          x: { ...baseScaleY("Acquisitions gained / wk"), ticks: { color: C.textMuted, font: { size: 9 }, callback: (v) => "+" + v }, suggestedMax: 1.8 },
          y: { ...baseScaleX, ticks: { color: C.text, font: { size: 10, weight: "600", family: "Inter" } } },
        },
      },
    });
  }

  // ===========================================================================
  // ROUTER
  // ===========================================================================
  const views = {
    overview: renderOverview,
    economics: renderEconomics,
    cadence: renderCadence,
    leadmix: renderLeadmix,
    funnel: renderFunnel,
    target: renderTarget,
  };
  let activeView = "overview";
  function render() {
    killCharts();
    (views[activeView] || renderOverview)();
  }

  document.querySelectorAll(".nav-item[data-view]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const v = btn.dataset.view;
      document.querySelectorAll(".nav-item").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      activeView = v;
      render();
      closeMobileSidebar();
    });
  });

  // Mobile sidebar
  const menuToggle = $("#menuToggle");
  const sidebar = $("#sidebar");
  const overlay = $("#sidebarOverlay");
  function closeMobileSidebar() {
    if (sidebar) sidebar.classList.remove("open");
    if (overlay) overlay.classList.remove("active");
  }
  if (menuToggle) menuToggle.addEventListener("click", () => {
    sidebar.classList.toggle("open");
    overlay.classList.toggle("active");
  });
  if (overlay) overlay.addEventListener("click", closeMobileSidebar);

  // initial render
  render();
})();
</script>

<style>
/* Small additive styling for the kpi sub-line only (does not touch styles.css) */
.kpi-sub { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-top: 4px; }
.strategic-headline { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
.strategic-subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 26px; line-height: 1.55; max-width: 900px; }
</style>

</body>
</html>
